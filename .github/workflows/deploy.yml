name: Deploy to AWS EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd
          cache: composer

      - name: Create build environment
        run: |
          cp .env.example .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "FILESYSTEM_DISK=local" >> .env
          touch database/database.sqlite
          if ! grep -q "APP_KEY=" .env; then
            echo "APP_KEY=" >> .env
          fi

      - name: Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader --no-scripts --no-interaction --prefer-dist

      - name: Generate key and run discovery
        run: |
          php artisan key:generate
          php artisan package:discover --ansi || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Restore custom routes index
        run: |
          if [ ! -f resources/js/routes/index.ts ]; then
            cp resources/js/routes/index.ts.example resources/js/routes/index.ts
          fi

      - name: Build Assets
        run: npm run build

      # ── Deploy PHP source to EC2 via SSH ──────────────────────────────────
      - name: Deploy source to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/bozor

            # Pull latest code
            git pull origin main

            # PHP dependencies (no dev, optimised)
            composer install --no-dev --optimize-autoloader --no-interaction

            # Run migrations safely
            php artisan migrate --force

            # Clear and rebuild caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Restart PHP-FPM and Nginx
            sudo systemctl reload php8.4-fpm
            sudo systemctl reload nginx

            # Restart queue worker so it picks up new code
            sudo systemctl restart bozor-worker

      # ── Upload built frontend assets via SCP ──────────────────────────────
      - name: Upload built assets to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "public/build"
          target: "/var/www/bozor/public"
          overwrite: true
          strip_components: 1