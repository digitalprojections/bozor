name: Deploy to Production via FTP

on:
  push:
    branches: [ main ]

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd

      - name: Create build environment
        run: |
          # Create minimal .env for build
          cp .env.example .env
          echo "DB_CONNECTION=sqlite" >> .env
          touch database/database.sqlite
          
          # Set APP_KEY if not exists
          if ! grep -q "APP_KEY=" .env; then
            echo "APP_KEY=" >> .env
          fi

      - name: Install PHP Dependencies (without scripts)
        run: composer install --no-dev --optimize-autoloader --no-scripts

      - name: Generate key and run discovery
        run: |
          php artisan key:generate
          php artisan package:discover --ansi || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Create production .env
        run: |
          cat > .env << EOF
          APP_NAME="${{ secrets.APP_NAME }}"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}
          LOG_CHANNEL=stack
          
          DB_CONNECTION=${{ secrets.DB_CONNECTION }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          EOF

      - name: Clean up build artifacts
        run: |
          rm -f database/database.sqlite
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          chmod -R 775 storage
          chmod -R 775 bootstrap/cache

      - name: 📂 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: ${{ secrets.FTP_TARGET_DIR }}/
          exclude: |
            .git*
            .github/
            node_modules/
            tests/
            .env.example
            phpunit.xml
            README.md
            .gitattributes
            .editorconfig
            database/database.sqlite