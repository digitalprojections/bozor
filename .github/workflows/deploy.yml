name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd

      - name: Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Prepare deployment files
        run: |
          # Remove development files
          rm -rf .git .github node_modules tests
          
          # Optimize Laravel
          php artisan optimize

      name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd

      - name: Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      # DEBUG: Test SSH connection first
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          debug: true  # Enable debug mode
          script: |
            echo "SSH Connection Successful"
            echo "Current directory: $(pwd)"
            echo "Directory listing:"
            ls -la
            echo "PHP version: $(php -v | head -n1)"

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v4.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_PORT: ${{ secrets.DEPLOY_PORT }}
          TARGET: ${{ secrets.DEPLOY_PATH }}
          ARGS: "-rlgoDzvc -i --delete -v"  # Added -v for verbose
          SOURCE: "./"
          EXCLUDE: ".git/, .github/, node_modules/, tests/, storage/framework/, storage/logs/, .env"

      - name: Post-deployment Setup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Set permissions
            find . -type f -exec chmod 644 {} \;
            find . -type d -exec chmod 755 {} \;
            chmod -R 775 storage bootstrap/cache
            chmod -R 775 storage/logs storage/framework
            
            # Environment setup
            if [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
              php artisan key:generate --force
            fi
            
            # Laravel optimizations
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Storage link
            php artisan storage:link || true
            
            # Clear old cache
            php artisan cache:clear
            php artisan view:clear