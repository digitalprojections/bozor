name: Deploy via SSH/SCP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd

      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci
          npm run build

        
      - name: Create Deployment Archive
        run: |
          zip -r deploy.zip . -x "*.git*" "node_modules/*" "tests/*" "storage/*.php" "bozor_rsa" "bozor_database" ".env" "deploy.zip"

      - name: Copy Archive via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.zip"
          target: "/home/${{ secrets.SSH_USERNAME }}/public_html/freemarket.created.link/"

      - name: Extract and Post-Deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/public_html/freemarket.created.link/
            unzip -o deploy.zip
            rm deploy.zip
            php artisan optimize:clear
            php artisan optimize