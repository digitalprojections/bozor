name: Deploy to cPanel via FTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd
          cache: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          composer install --no-dev --optimize-autoloader --no-scripts
          npm ci --prefer-offline --no-audit
          npm run build

          
      - name: 📂 Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          # Set the destination to your subdomain root
          server-dir: /public_html/freemarket/
          # Ensure a more secure connection if supported
          force-ssl: true
          # Upload only changed files from the current directory
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            .env*
            bozor_database
            git_grep_output.txt
            yahoo.html
            README.md
            DEPLOYMENT.md
            composer.lock
            package-lock.json
            tsconfig.json
            vite.config.ts
            eslint.config.js
            pint.json
            phpunit.xml
            components.json
            boost.json